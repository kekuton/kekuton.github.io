<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Вопросы для двоих</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <section id="categoriesScreen" class="screen active">
      <header class="topbar">
        <button id="themeToggle" class="icon-btn" aria-label="Тема">🌙</button>
        <div class="title-wrap">
          <h1>Вопросы для двоих</h1>
          <p>Игра для пары</p>
        </div>
        <button id="randomBtn" class="icon-btn" aria-label="Рандом">🎲</button>
      </header>

      <div class="categories-grid" id="categoriesGrid"></div>
    </section>

    <section id="questionsScreen" class="screen hidden">
      <header class="topbar questions-bar">
        <button id="backBtn" class="icon-btn" aria-label="Назад">←</button>
        <div class="title-wrap compact">
          <h2 id="categoryTitle">Категория</h2>
          <p id="questionCounter">Вопрос 1</p>
        </div>
        <button id="finishBtn" class="icon-btn" aria-label="Результаты">🏁</button>
      </header>

      <div class="mode-chip" id="modeChip">Категория</div>

      <div class="card-stack">
        <div id="tinderCard" class="tinder-card" tabindex="0" aria-live="polite">
          <div class="stamp like" id="likeStamp">Совпало</div>
          <div class="stamp nope" id="nopeStamp">Не совпало</div>
          <div class="question-text" id="questionText">Загрузка...</div>
          <div class="subhint" id="questionSubhint">Свайп влево/вправо или кнопки ниже</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div id="progressText">0 / 0</div>
        <div class="progress-bar"><div id="progressFill"></div></div>
      </div>

      <div class="actions">
        <button id="prevBtn" class="secondary-btn">← Назад</button>
        <button id="skipBtn" class="secondary-btn">Пропуск</button>
      </div>
      <div class="actions actions-main">
        <button id="mismatchBtn" class="danger-btn">✖ Не совпало</button>
        <button id="matchBtn" class="success-btn">❤ Совпало</button>
      </div>
    </section>

    <section id="resultsScreen" class="screen hidden">
      <header class="topbar questions-bar">
        <button id="backToCategoriesTop" class="icon-btn" aria-label="Назад">←</button>
        <div class="title-wrap compact">
          <h2>Результаты</h2>
          <p id="resultsSubtitle">Категория</p>
        </div>
        <div style="width:44px"></div>
      </header>

      <div class="results-card">
        <div class="percent" id="resultsPercent">0%</div>
        <div class="results-grid">
          <div><span>Совпало</span><strong id="resultsMatches">0</strong></div>
          <div><span>Не совпало</span><strong id="resultsMismatches">0</strong></div>
          <div><span>Пропущено</span><strong id="resultsSkipped">0</strong></div>
        </div>
        <div class="actions stack">
          <button id="shareBtn" class="success-btn wide">Поделиться</button>
          <button id="restartBtn" class="secondary-btn wide">Пройти заново</button>
          <button id="backToCategoriesBtn" class="secondary-btn wide">К категориям</button>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
